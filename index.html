<div class="relative">

    <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined">
        lock
    </span>

    <input 
        id="password"
        type="password"
        placeholder="Password"
        class="w-full h-14 pl-14 pr-14 rounded-md focus:ring-2 focus:ring-primary/20">

    <button 
        type="button"
        id="togglePassword"
        class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined">
        visibility
    </button>

</div>

<script>
const password = document.getElementById("password");
const toggleBtn = document.getElementById("togglePassword");

toggleBtn.addEventListener("click", function () {
    
    if (password.type === "password") {
        password.type = "text";
        toggleBtn.textContent = "visibility_off";
    } else {
        password.type = "password";
        toggleBtn.textContent = "visibility";
    }

});
</script>
